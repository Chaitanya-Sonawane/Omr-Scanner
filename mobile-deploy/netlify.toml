[build]
  command = "echo 'No build needed for static mobile site'"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "https://omr-scanner-1-cmbe.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(*), microphone=()"
    Feature-Policy = "camera *"
