[build]
  base    = "omr-web/frontend"
  command = "npm run build"
  publish = "omr-web/frontend/dist"

[[redirects]]
  from   = "/api/*"
  to     = "https://omr-scanner-api.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
