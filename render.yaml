services:
  - type: web
    name: omr-scanner-api
    runtime: python
    buildCommand: pip install -r requirements.api.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://omrsheetscanner.netlify.app
    autoDeploy: true
